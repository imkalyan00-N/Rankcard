<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rank Card</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #fff; padding: 20px; }
        .card { width: 210mm; margin: auto; padding: 20px; border: 1px solid #000; }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 10px; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .data-table td, .data-table th { border: 1px solid #000; padding: 8px; }
        .download-btn { text-align: center; margin-top: 20px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <img src="ap_logo.png" width="80" alt="Logo">
            <div style="text-align:center">
                <h2>AP EAPCET - 2026 RANK CARD</h2>
            </div>
            <img src="apsche_logo.png" width="80" alt="Logo">
        </div>
        
        <h3>Candidate Details</h3>
        <p>Hall Ticket: 561171010199 | Name: KATTA KEERTANA</p>
        
        <table class="data-table">
            <tr><th>Subject</th><th>Marks</th></tr>
            <tr><td>Botany</td><td>09</td></tr>
            <tr><td>Zoology</td><td>08</td></tr>
            <tr><td>Physics</td><td>05</td></tr>
            <tr><td>Chemistry</td><td>05</td></tr>
            <tr><th>Total</th><th>27</th></tr>
        </table>
        
        <h3>Rank Details</h3>
        <p>State General Rank: <b>92456</b></p>
        <p>Category Rank (ST): <b>4124</b></p>
    </div>

    <div class="download-btn no-print">
        <button onclick="window.print()">Download Rank Card</button>
    </div>
</body>
</html>
